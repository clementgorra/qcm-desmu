<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>QCM DESMU</title>

<style>
:root {
  --bg: #ffffff;
  --text: #111;
  --card: #f5f5f5;
  --primary: #2563eb;
  --correct: #16a34a;
  --wrong: #dc2626;
}

[data-theme="dark"] {
  --bg: #0f172a;
  --text: #e5e7eb;
  --card: #1e293b;
  --primary: #60a5fa;
  --correct: #22c55e;
  --wrong: #ef4444;
}

body {
  margin: 0;
  font-family: system-ui, Arial;
  background: var(--bg);
  color: var(--text);
}

.container {
  max-width: 800px;
  margin: auto;
  padding: 20px;
}

h1 { text-align: center; }

.card {
  background: var(--card);
  padding: 15px;
  border-radius: 10px;
  margin-top: 10px;
}

button {
  padding: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.btn {
  background: var(--primary);
  color: white;
  margin: 5px 0;
  width: 100%;
}

.option {
  display: block;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  background: rgba(0,0,0,0.05);
  cursor: pointer;
}

.option.correct {
  background: var(--correct);
  color: white;
}

.option.wrong {
  background: var(--wrong);
  color: white;
}

.topbar {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  flex-wrap: wrap;
}

select, input {
  padding: 8px;
  border-radius: 8px;
}

.hidden { display: none; }
</style>
</head>

<body>
<div class="container">

<h1>QCM DESMU</h1>

<div class="topbar">
  <button onclick="toggleTheme()">🌙 / ☀️</button>

  <select id="categorySelect"></select>

  <input id="randomCount" type="number" min="1" placeholder="Nb questions (optionnel)" />

  <button class="btn" onclick="startQuiz()">Démarrer</button>
</div>

<div id="quiz" class="card hidden">
  <h3 id="questionText"></h3>
  <div id="options"></div>
  <button class="btn" id="nextBtn" onclick="nextQuestion()" disabled>Suivant</button>
</div>

</div>

<script>
// ===================== DATA =====================
const questionsData = [
  {
    category: "ORGANISATION EN MU",
    text: "Concernant la SAUV...",
    options: [
      { text: "Une infirmière dédiée", correct: false },
      { text: "Matériel complet de réanimation", correct: true },
      { text: "Accueil détresse vitale potentielle", correct: true },
      { text: "Accueil détresse vitale existante", correct: true },
      { text: "Peut être hors urgences", correct: false }
    ]
  },
  {
    category: "SEPSIS",
    text: "Définition du sepsis (Sepsis-3)",
    options: [
      { text: "qSOFA > 2", correct: true },
      { text: "IRA sévère", correct: true },
      { text: "Hypotension + vasopresseurs + lactate", correct: false },
      { text: "Hyperlactatémie seule", correct: false },
      { text: "Hypotension seule", correct: false }
    ]
  }
];

// ===================== STATE =====================
let current = 0;
let quizSet = [];
let answered = false;

// ===================== INIT =====================
function initCategories() {
  const select = document.getElementById("categorySelect");
  const categories = [...new Set(questionsData.map(q => q.category))];

  select.innerHTML = `<option value="ALL">Toutes catégories</option>`;
  categories.forEach(c => {
    select.innerHTML += `<option value="${c}">${c}</option>`;
  });
}

initCategories();

// ===================== QUIZ LOGIC =====================
function startQuiz() {
  const cat = document.getElementById("categorySelect").value;
  const count = parseInt(document.getElementById("randomCount").value);

  let filtered = questionsData;

  if (cat !== "ALL") {
    filtered = filtered.filter(q => q.category === cat);
  }

  if (!isNaN(count) && count > 0) {
    filtered = shuffle(filtered).slice(0, count);
  }

  quizSet = filtered;
  current = 0;

  document.getElementById("quiz").classList.remove("hidden");
  showQuestion();
}

function showQuestion() {
  answered = false;
  document.getElementById("nextBtn").disabled = true;

  const q = quizSet[current];
  document.getElementById("questionText").innerText = q.text;

  const container = document.getElementById("options");
  container.innerHTML = "";

  q.options.forEach((opt, i) => {
    const div = document.createElement("div");
    div.className = "option";
    div.innerText = opt.text;

    div.onclick = () => selectAnswer(div, opt);
    container.appendChild(div);
  });
}

function selectAnswer(div, opt) {
  if (answered) return;
  answered = true;

  const optionsDiv = document.querySelectorAll(".option");

  quizSet[current].options.forEach((o, i) => {
    if (o.correct) optionsDiv[i].classList.add("correct");
    else optionsDiv[i].classList.add("wrong");
  });

  document.getElementById("nextBtn").disabled = false;
}

function nextQuestion() {
  current++;
  if (current >= quizSet.length) {
    document.getElementById("quiz").innerHTML =
      "<h2>Fin du QCM</h2><p>Vous pouvez relancer un test.</p>";
    return;
  }
  showQuestion();
}

// ===================== UTILS =====================
function shuffle(arr) {
  return arr.sort(() => Math.random() - 0.5);
}

// ===================== THEME =====================
function toggleTheme() {
  const root = document.documentElement;
  if (root.getAttribute("data-theme") === "dark") {
    root.removeAttribute("data-theme");
  } else {
    root.setAttribute("data-theme", "dark");
  }
}
</script>

</body>
</html>
